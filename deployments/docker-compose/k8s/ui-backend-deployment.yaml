apiVersion: apps/v1
kind: Deployment
metadata:
  name: ui-backend
  namespace: marketmonitor
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ui-backend
  template:
    metadata:
      labels:
        app: ui-backend
    spec:
      containers:
        - name: ui-backend
          image: marketmonitor/ui-backend:latest
          ports:
            - containerPort: 8000
          envFrom:
            - secretRef:
                name: marketmonitor-secrets
            - configMapRef:
                name: marketmonitor-config
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 3
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: ui-backend
  namespace: marketmonitor
spec:
  selector:
    app: ui-backend
  ports:
    - port: 8000
      targetPort: 8000
  type: ClusterIP
