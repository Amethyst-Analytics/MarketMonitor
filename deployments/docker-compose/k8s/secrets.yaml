apiVersion: v1
kind: Secret
metadata:
  name: marketmonitor-secrets
  namespace: marketmonitor
type: Opaque
stringData:
  # Populate these with real values (e.g., via kubectl create secret generic)
  UPSTOX_CLIENT_ID: ""
  UPSTOX_CLIENT_SECRET: ""
  UPSTOX_ACCESS_TOKEN: ""
  UPSTOX_PG_DSN: "postgresql://postgres:admin123@timescaledb:5432/market_data"
  UPSTOX_REDIS_URL: "redis://redis:6379/0"
  # Optional SMTP
  SMTP_HOST: ""
  SMTP_PORT: "587"
  SMTP_USER: ""
  SMTP_PASS: ""
  SMTP_SENDER: ""
  SMTP_RECIPIENTS: ""
