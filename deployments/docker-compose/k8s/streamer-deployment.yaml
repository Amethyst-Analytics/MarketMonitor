apiVersion: apps/v1
kind: Deployment
metadata:
  name: streamer
  namespace: marketmonitor
spec:
  replicas: 1
  selector:
    matchLabels:
      app: streamer
  template:
    metadata:
      labels:
        app: streamer
    spec:
      containers:
        - name: streamer
          image: marketmonitor/streamer:latest
          envFrom:
            - secretRef:
                name: marketmonitor-secrets
            - configMapRef:
                name: marketmonitor-config
          resources:
            requests:
              memory: "512Mi"
              cpu: "500m"
            limits:
              memory: "1Gi"
              cpu: "1000m"
          volumeMounts:
            - name: catalog
              mountPath: /app/complete_data_formatted.json
              subPath: complete_data_formatted.json
          livenessProbe:
            exec:
              command:
                - python
                - -c
                - "import sys; sys.exit(0)"
            initialDelaySeconds: 30
            periodSeconds: 60
          readinessProbe:
            exec:
              command:
                - python
                - -c
                - "import sys; sys.exit(0)"
            initialDelaySeconds: 10
            periodSeconds: 30
      volumes:
        - name: catalog
          configMap:
            name: instrument-catalog
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: instrument-catalog
  namespace: marketmonitor
data:
  complete_data_formatted.json: ""
