apiVersion: apps/v1
kind: Deployment
metadata:
  name: ui-frontend
  namespace: marketmonitor
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ui-frontend
  template:
    metadata:
      labels:
        app: ui-frontend
    spec:
      containers:
        - name: ui-frontend
          image: marketmonitor/ui-frontend:latest
          ports:
            - containerPort: 8501
          env:
            - name: BACKEND_URL
              value: "http://ui-backend:8000"
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /_stcore/health
              port: 8501
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /_stcore/health
              port: 8501
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: ui-frontend
  namespace: marketmonitor
spec:
  selector:
    app: ui-frontend
  ports:
    - port: 8501
      targetPort: 8501
  type: ClusterIP
