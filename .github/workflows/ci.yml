name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python -m pip install -r requirements.txt
      - name: Run ruff
        run: ruff check src tests
      - name: Run black
        run: black --check src tests
      - name: Run mypy
        run: mypy src

  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: timescale/timescaledb:latest-pg15
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: market_data
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python -m pip install -r requirements.txt
      - name: Run tests
        env:
          UPSTOX_CLIENT_ID: dummy
          UPSTOX_CLIENT_SECRET: dummy
          UPSTOX_ACCESS_TOKEN: dummy
          UPSTOX_PG_DSN: postgresql://postgres:postgres@localhost:5432/market_data
          UPSTOX_REDIS_URL: redis://localhost:6379/0
        run: |
          pytest tests -v --tb=short
